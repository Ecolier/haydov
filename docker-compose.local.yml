version: "3"

services:

  accounts: 
    volumes:
      - ./accounts/src:/app/accounts/src
      - ./accounts/public:/app/accounts/public
      - ./accounts/.env.local:/app/accounts/.env.local

  auth:
    build:
      args:
        NODE_ENV: ${NODE_ENV}

  auth-db:
    environment:
      POSTGRES_PASSWORD: admin

  api-db:
    environment:
      POSTGRES_PASSWORD: admin

  kratos-db:
    environment:
      POSTGRES_PASSWORD: admin